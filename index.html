<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>Buscador de ubicaciones</title>
<style>
:root{--bg:#eef3f8;--card:#fff;--text:#0f172a;--muted:#64748b;--primary:#2563eb;--border:#dbe4ee}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text);background:linear-gradient(145deg,#dbeafe,var(--bg) 45%,#e0f2fe)}
.app{width:min(100%,560px);min-height:100vh;margin:auto;padding:18px 16px 28px}
header{display:flex;gap:12px;align-items:center;margin-bottom:16px}
.logo{display:grid;place-items:center;width:52px;height:52px;border-radius:16px;color:#fff;background:linear-gradient(135deg,#2563eb,#38bdf8);font-size:24px;font-weight:900;box-shadow:0 12px 24px #2563eb33}
h1{font-size:22px;margin:0}.sub{margin:3px 0 0;color:var(--muted);font-size:12px}
.card{margin-bottom:14px;padding:16px;border:1px solid var(--border);border-radius:18px;background:#fffffff2;box-shadow:0 16px 36px #0f172a1a}
.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.head h2{margin:0;font-size:15px}
.badge{padding:4px 8px;border-radius:999px;background:#dbeafe;color:#1d4ed8;font-size:10px;font-weight:900}
.row{display:grid;grid-template-columns:1fr auto;gap:9px}
input,button{font:inherit}
.field{width:100%;min-height:54px;padding:13px 15px;border:1px solid var(--border);border-radius:14px;outline:0;background:#f8fafc;font-size:20px}
.field:focus{border-color:var(--primary);box-shadow:0 0 0 4px #2563eb1a;background:#fff}
button{border:0;border-radius:14px;cursor:pointer;font-weight:850}
.primary{min-width:92px;padding:12px 15px;color:#fff;background:linear-gradient(135deg,#2563eb,#3b82f6)}
.result{display:none;margin-top:14px;padding:20px;border-radius:16px;text-align:center}
.result.ok{display:block;border:1px solid #86efac;background:#dcfce7}
.result.none{display:block;border:1px solid #fcd34d;background:#fef3c7}
.result.bad{display:block;border:1px solid #fca5a5;background:#fee2e2}
.label{color:var(--muted);font-size:11px;font-weight:900;text-transform:uppercase}
.rid{font-size:14px;font-weight:800}.pos{margin-top:6px;font-size:clamp(32px,10vw,52px);font-weight:950}
.ok .pos{color:#15803d}.none .pos{color:#b45309;font-size:28px}.bad .pos{color:#b91c1c;font-size:26px}
.list{display:grid;gap:8px;margin-top:12px}
.item{display:flex;justify-content:space-between;gap:10px;padding:12px;border:1px solid var(--border);border-radius:12px;background:#f8fafc;cursor:pointer}
.id{font-weight:850}.loc{color:var(--muted);font-size:12px;text-align:right}
.state{color:var(--muted);font-size:12px;line-height:1.5}
.secondary{width:100%;padding:10px;color:#334155;background:#e2e8f0;font-size:12px}
@media(max-width:420px){.row{grid-template-columns:1fr}.primary{min-height:48px}}
</style>
</head>
<body>
<div class="app">
<header><div class="logo">U</div><div><h1>Buscador de ubicaciones</h1><p class="sub">Base de datos integrada</p></div></header>

<section class="card">
<div class="head"><h2>Buscar producto</h2><span class="badge">Offline</span></div>
<div class="row">
<input id="q" class="field" type="search" inputmode="numeric" autocomplete="off" placeholder="Introduce la referencia">
<button id="search" class="primary">Buscar</button>
</div>
<div id="result" class="result"><div class="label">Resultado</div><div id="rid" class="rid"></div><div id="pos" class="pos"></div></div>
<div id="suggestions" class="list"></div>
</section>

<section class="card">
<div class="head"><h2>Base de datos</h2><span class="badge">2947 productos</span></div>
<div class="state">Los datos del Excel están incluidos directamente en este archivo. No necesitas importar nada ni tener conexión a Internet.</div>
</section>

<section class="card">
<div class="head"><h2>Últimas búsquedas</h2><span class="badge">Historial</span></div>
<div id="history" class="list"></div>
<button id="clearHistory" class="secondary" style="margin-top:10px">Borrar historial</button>
</section>
</div>

const MAP=new Map(PRODUCTS.map(p=>[String(p.id).toUpperCase(),p]));
const KH="buscador_historial_integrado_v1";
const $=id=>document.getElementById(id);
const q=$("q"),result=$("result"),rid=$("rid"),pos=$("pos"),suggestions=$("suggestions"),history=$("history");
let recent=[];
try{recent=JSON.parse(localStorage.getItem(KH))||[]}catch{recent=[]}
function esc(v){const d=document.createElement("div");d.textContent=String(v);return d.innerHTML}
function show(id,location,type){result.className="result "+type;rid.textContent=id||"—";pos.textContent=location}
function renderItems(items,container,clicker){container.innerHTML="";if(!items.length)return;items.forEach(p=>{const e=document.createElement("div");e.className="item";e.innerHTML=`<span class="id">${esc(p.id)}</span><span class="loc">${esc(p.ubicacion||"Sin asignar")}</span>`;e.onclick=()=>clicker(p);container.appendChild(e)})}
function renderHistory(){history.innerHTML="";if(!recent.length){history.innerHTML='<div class="state">Todavía no hay búsquedas.</div>';return}renderItems(recent,history,p=>{q.value=p.id;search()})}
function addHistory(p){recent=recent.filter(x=>x.id!==p.id);recent.unshift({id:p.id,ubicacion:p.ubicacion||"Sin asignar"});recent=recent.slice(0,10);localStorage.setItem(KH,JSON.stringify(recent));renderHistory()}
function search(){
 const text=String(q.value||"").trim().toUpperCase();suggestions.innerHTML="";
 if(!text){show("","Introduce una referencia","bad");return}
 const p=MAP.get(text);
 if(p){show(p.id,p.ubicacion||"Sin asignar",p.ubicacion?"ok":"none");addHistory(p);return}
 const matches=PRODUCTS.filter(x=>String(x.id).includes(text)).slice(0,8);
 show(text,"No encontrado","bad");
 renderItems(matches,suggestions,p=>{q.value=p.id;search()})
}
$("search").onclick=search;
q.onkeydown=e=>{if(e.key==="Enter")search()};
q.oninput=()=>{const t=String(q.value||"").trim();if(t.length<3){suggestions.innerHTML="";return}renderItems(PRODUCTS.filter(x=>String(x.id).includes(t)).slice(0,8),suggestions,p=>{q.value=p.id;search()})};
$("clearHistory").onclick=()=>{recent=[];localStorage.removeItem(KH);renderHistory()};
renderHistory();
